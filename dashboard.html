<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
body{background:#f5f5f7;color:#000;font-family:-apple-system,sans-serif;padding:20px}
.container{max-width:600px;margin:0 auto}
.card{background:white;border-radius:20px;padding:25px;margin:15px 0;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.stat{background:#f5f5f7;padding:15px;border-radius:15px;text-align:center}
.stat h3{color:#00D084;font-size:28px}
.tx-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee}
</style>
</head>
<body>
<div class="container">
  <h1>Dashboard</h1>
  
  <div class="card">
    <h3>Voice Usage This Week</h3>
    <div class="stat-grid">
      <div class="stat"><h3>4min</h3><p>Time Saved</p></div>
      <div class="stat"><h3>12</h3><p>Voice Commands</p></div>
    </div>
  </div>
  
  <div class="card">
    <h3>Recent Transactions</h3>
    <div class="tx-item">
      <span>Sent to Seyi</span>
      <span style="color:#00D084">-₦5,000</span>
    </div>
    <div class="tx-item">
      <span>PHCN Bill</span>
      <span style="color:#00D084">-₦3,200</span>
    </div>
  </div>
  
  <div class="card">
    <h3>Privacy Settings</h3>
    <label><input type="checkbox" checked> Store voice embeddings only</label><br>
    <label><input type="checkbox" checked> Delete audio after 24hrs</label>
  </div>
</div>
</body>
</html>
